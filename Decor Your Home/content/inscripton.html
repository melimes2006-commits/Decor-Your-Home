<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Decor Your Home</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <div class="page-inscription">

        <div class="login-box">

            <h2>Créer un compte</h2>
            <form>

            <label for="nom">Nom :</label><br>
            <input type="text" id="nom" placeholder="Votre nom"><br><br>

            <label for="prenom">Prenom :</label><br>
            <input type="text" id="prenom" placeholder="Votre prenom"><br><br>

            <label for="telephone">Telephone :</label><br>
            <input type="tel" id="telephone" placeholder="Votre numero" pattern="[0-9]{10}"><br><br>

            <label for="email">Email :</label><br>
            <input type="email" id="email" placeholder="Votre email"><br><br>

            <label for="password">Mot de passe :</label><br>
            <input type="password" id="password" placeholder="Mot de passe"><br><br>

            <button type="button" onclick="inscription()">S'inscrire</button>
         </form>

         <p id="message"></p>
     </div>   
    </main>

        </nav>
    </header>

</html>
