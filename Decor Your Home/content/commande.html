<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Commande</title>

    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

    <header>

        <h1>Decor Your Home</h1>

        <nav>
            <a href="../index.html">Accueil</a>
            <a href="produits.html">Produits</a>
            <a href="inscripton.html">Inscription</a>
            <a href="connexion.html">Connexion</a>
        </nav>

    </header>

    <main class="page-commande">

        <div class="commande-box">

            <h2>Passer une commande</h2>

            <form>

                <label for="nom">Nom :</label>
                <input type="text" id="nom">

                <label for="telephone">Téléphone :</label>
                <input type="text" id="telephone">

                <label for="adresse">Adresse :</label>
                <input type="text" id="adresse">

                <label for="produit">Produit :</label>

                <select id="produit">

                    <option>Canapé</option>
                    <option>Table</option>
                    <option>Rangement</option>
                    <option>Lit</option>

                </select>

                <button type="button" onclick="commander()">
                    Commander
                </button>

            </form>

            <p id="messageCommande"></p>

        </div>

    </main>

    <script src="../javascript/commande.js"></script>

</body>

</html>
